listener 1883
protocol mqtt

listener 9001
protocol websockets

allow_anonymous true
persistence false

log_dest stdout
# Keep logs lean: errors, warnings, notices. Avoid 'all'/debug/subscribe/publish
# which generate megabytes per hour at production message rates and will
# eventually fill the host disk via Docker's json-file log driver.
log_type error
log_type warning
log_type notice
connection_messages false
